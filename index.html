<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Eye Tracking Exercises</title>
    <meta name="description" content="Customizable visual tracking exercises for eye flexibility and concentration.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="canvas-container">
            <canvas id="tracking-canvas"></canvas>
        </div>

        <aside id="controls-panel" class="controls-panel">
            <div class="controls-header">
                <h1>Eye Tracking</h1>
                <button id="toggle-fullscreen" class="icon-button" title="Toggle Fullscreen">⛶</button>
            </div>

            <div class="controls-body">
                <div class="control-group">
                    <label for="pattern-select">Pattern Pattern</label>
                    <select id="pattern-select">
                        <option value="horizontal">Horizontal Side-to-Side</option>
                        <option value="vertical">Vertical Up-and-Down</option>
                        <option value="diagonal">Corner Sequence</option>
                        <option value="hourglass">Diagonal Cross (Hourglass)</option>
                        <option value="fullcross">Full Cross Tour</option>
                        <option value="circle">Circular Rotation</option>
                        <option value="figure8">Figure 8 (Infinity)</option>
                        <option value="square">Square Boundary</option>
                        <option value="random">Smooth Pursuit (Random)</option>
                        <option value="cycle">Cycle Selected (Auto-Rotate)</option>
                    </select>
                </div>
                
                <div class="control-group" id="cycle-settings-group" style="display: none; flex-direction: column; gap: 10px; background: var(--input-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--input-border);">
                    <label>
                        Duration per Pattern <span id="cycle-duration-val">30s</span>
                    </label>
                    <input type="range" id="cycle-duration-slider" min="5" max="120" step="5" value="30">
                    
                    <label style="margin-top: 10px;">Select Patterns to Cycle:</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85rem;" id="cycle-checkboxes">
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="horizontal" checked> Horizontal</label>
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="vertical" checked> Vertical</label>
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="diagonal" checked> Corners</label>
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="hourglass" checked> Hourglass</label>
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="fullcross" checked> Full Cross</label>
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="circle" checked> Circle</label>
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="figure8" checked> Figure 8</label>
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="square" checked> Square</label>
                        <label style="cursor: pointer; justify-content: flex-start; gap: 6px;"><input type="checkbox" value="random"> Random</label>
                    </div>
                </div>

                <div class="control-group">
                    <label>
                        Speed <span id="speed-val">1x</span>
                    </label>
                    <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1">
                </div>

                <div class="control-group">
                    <label>
                        Ball Size <span id="size-val">30px</span>
                    </label>
                    <input type="range" id="size-slider" min="10" max="150" step="5" value="30">
                </div>

                <div class="control-group">
                    <label for="theme-select">Theme</label>
                    <select id="theme-select">
                        <option value="dark">Dark Theme (Green on Black)</option>
                        <option value="light">Light Theme (Black on White)</option>
                        <option value="contrast">High Contrast (Red on Black)</option>
                        <option value="neon">Cyberpunk Neon</option>
                        <option value="custom">Custom Colors</option>
                    </select>
                </div>

                <div class="control-group" style="flex-direction: row; align-items: center; justify-content: space-between;">
                    <label for="show-path-check" style="cursor: pointer; flex-grow: 1;">Show Target Path</label>
                    <input type="checkbox" id="show-path-check" style="cursor: pointer; width: 18px; height: 18px;">
                </div>

                <div class="control-group" id="custom-colors-group" style="display: none; flex-direction: row; justify-content: space-between; gap: 10px;">
                    <div style="display: flex; flex-direction: column; width: 48%; gap: 6px;">
                        <label for="custom-bg-color" style="font-size: 0.8rem;">Background</label>
                        <input type="color" id="custom-bg-color" value="#1a1a2e" style="width: 100%; height: 35px; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
                    </div>
                    <div style="display: flex; flex-direction: column; width: 48%; gap: 6px;">
                        <label for="custom-ball-color" style="font-size: 0.8rem;">Ball / Accent</label>
                        <input type="color" id="custom-ball-color" value="#e94560" style="width: 100%; height: 35px; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
                    </div>
                </div>
                
                <div class="control-group">
                    <label>
                        Number of Balls <span id="count-val">1</span>
                    </label>
                    <input type="range" id="count-slider" min="1" max="10" step="1" value="1">
                </div>
                
                <div class="control-group">
                    <label>
                        Trail Effect <span id="trail-val">0%</span>
                    </label>
                    <input type="range" id="trail-slider" min="0" max="0.95" step="0.05" value="0">
                </div>

                <button id="start-btn" class="primary-button">Start Exercise</button>
            </div>
        </aside>

        <!-- Toggle control panel visibility when running -->
        <button id="toggle-panel-btn" class="floating-btn" title="Toggle Controls">⚙</button>

        <!-- Session Timer -->
        <div id="session-timer-container" class="timer-container">
            <span id="session-timer">00:00</span>
            <button id="reset-timer-btn" class="icon-button" title="Reset Timer" style="font-size: 1.2rem; margin-top: -2px;">⟳</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
